<polyline points="38,236 1878,236" fill="none" stroke="#cbd1d6" stroke-width="1"/>
<text x="60" y="273" fill="#667085" font-size="9" font-weight="500"><tspan x="60" dy="0">ANSWER / EDITORIAL</tspan></text>
<text x="60" y="351" fill="#17212b" font-size="60" font-weight="600"><tspan x="60" dy="0">C</tspan></text>
<text x="103" y="310" fill="#17212b" font-size="18" font-weight="500"><tspan x="103" dy="0">ities remember in layers: through street names, buildings, archives, rituals,</tspan></text>
<text x="103" y="340" fill="#17212b" font-size="18" font-weight="500"><tspan x="103" dy="0">and the stories residents repeat. Official records preserve decisions, while</tspan></text>
<text x="60" y="371" fill="#17212b" font-size="18" font-weight="500"><tspan x="60" dy="0">everyday memory often survives in landmarks, local language, and contested public space.</tspan></text>
<ellipse cx="905.5" cy="360.5" rx="8.5" ry="8.5" fill="#acd8ff" stroke="#17212b" stroke-width="1" filter="url(#w)"/>
<text x="902.5" y="362" fill="#17212b" font-size="8" font-weight="500"><tspan x="902.5" dy="0">1</tspan></text>
<text x="60" y="424" fill="#17212b" font-size="18" font-weight="500"><tspan x="60" dy="0">What gets remembered is never neutral. A preserved courthouse, renamed avenue, or</tspan></text>
<text x="60" y="454" fill="#17212b" font-size="18" font-weight="500"><tspan x="60" dy="0">demolished neighborhood can all reveal who had the power to define the shared past.</tspan></text>
<ellipse cx="869.5" cy="443.5" rx="8.5" ry="8.5" fill="#acd8ff" stroke="#17212b" stroke-width="1" filter="url(#w)"/>
<text x="866.5" y="445" fill="#17212b" font-size="8" font-weight="500"><tspan x="866.5" dy="0">2</tspan></text>
<text x="60" y="507" fill="#17212b" font-size="18" font-weight="500"><tspan x="60" dy="0">Memory also lives outside institutions—in family stories, recurring festivals, protest routes,</tspan></text>
<text x="60" y="537" fill="#17212b" font-size="18" font-weight="500"><tspan x="60" dy="0">and informal names that persist long after an official map has changed.</tspan></text>
<ellipse cx="743.5" cy="526.5" rx="8.5" ry="8.5" fill="#acd8ff" stroke="#17212b" stroke-width="1" filter="url(#w)"/>
<text x="740.5" y="528" fill="#17212b" font-size="8" font-weight="500"><tspan x="740.5" dy="0">3</tspan></text>
<rect x="60" y="567" width="1220" height="74" rx="6" fill="#efffc4" stroke="#17212b" stroke-width="1"  filter="url(#w)"/>
<text x="80" y="589" fill="#17212b" font-size="8" font-weight="500"><tspan x="80" dy="0">WHERE THIS LEAVES US</tspan></text>
<text x="80" y="618" fill="#17212b" font-size="15" font-weight="500"><tspan x="80" dy="0">A city's memory is less like a vault and more like a negotiation that every generation quietly edits.</tspan></text>
