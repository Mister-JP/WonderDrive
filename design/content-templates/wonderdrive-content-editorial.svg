<text x="838" y="884" fill="#17212b" font-size="8" font-weight="500"><tspan x="838" dy="0">LOSS &amp; RECOVERY</tspan></text>
<text x="805" y="924" fill="#17212b" font-size="17" font-weight="500"><tspan x="805" dy="0">Can a city recover a memory it deliberately erased?</tspan></text>
