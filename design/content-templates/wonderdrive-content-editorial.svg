<text x="58" y="153" fill="#d64b38" font-size="9" font-weight="500"><tspan x="58" dy="0">TURN 01 · SAGE</tspan></text>
<text x="58" y="196" fill="#17212b" font-size="28" font-weight="600"><tspan x="58" dy="0">Where does a city keep its memories?</tspan></text>
