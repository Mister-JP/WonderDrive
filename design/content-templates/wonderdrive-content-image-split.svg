<text x="850" y="273" fill="#667085" font-size="9" font-weight="500"><tspan x="850" dy="0">ANSWER / INTERPRETATION</tspan></text>
<text x="850" y="314" fill="#17212b" font-size="22" font-weight="600"><tspan x="850" dy="0">The visible city is only</tspan></text>
<text x="850" y="343" fill="#17212b" font-size="22" font-weight="600"><tspan x="850" dy="0">one layer of its memory.</tspan></text>
<text x="850" y="385" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">Buildings, street names, and monuments make</tspan></text>
<text x="850" y="411" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">some histories easy to encounter. Other memories</tspan></text>
<text x="850" y="437" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">survive through oral accounts, local rituals, and</tspan></text>
<text x="850" y="463" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">the persistence of community names.</tspan></text>
<ellipse cx="1190.5" cy="456.5" rx="8.5" ry="8.5" fill="#acd8ff" stroke="#17212b" stroke-width="1" filter="url(#w)"/>
<text x="1187.5" y="458" fill="#17212b" font-size="8" font-weight="500"><tspan x="1187.5" dy="0">1</tspan></text>
<text x="850" y="511" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">The tension between those layers reveals who</tspan></text>
<text x="850" y="537" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">has been able to make memory public—and whose</tspan></text>
<text x="850" y="563" fill="#17212b" font-size="14" font-weight="500"><tspan x="850" dy="0">past must be actively recovered.</tspan></text>
<ellipse cx="1125.5" cy="556.5" rx="8.5" ry="8.5" fill="#acd8ff" stroke="#17212b" stroke-width="1" filter="url(#w)"/>
