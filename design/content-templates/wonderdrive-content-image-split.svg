<text x="1287" y="326" fill="#17212b" font-size="17" font-weight="500"><tspan x="1287" dy="0">The skyline presents continuity.</tspan></text>
<text x="1287" y="355" fill="#17212b" font-size="12" font-weight="500"><tspan x="1287" dy="0">The archive reveals replacement, renaming,</tspan></text>
