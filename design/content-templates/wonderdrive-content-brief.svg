<text x="476" y="474" fill="#17212b" font-size="21" font-weight="500"><tspan x="476" dy="0">Places</tspan></text>
<text x="476" y="502" fill="#17212b" font-size="13" font-weight="500"><tspan x="476" dy="0">Buildings and streets turn memory into something people encounter daily.</tspan></text>
