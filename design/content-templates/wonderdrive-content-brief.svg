<text x="1304" y="291" fill="#dfff58" font-size="9" font-weight="500"><tspan x="1304" dy="0">WHAT REMAINS UNCERTAIN</tspan></text>
<text x="1304" y="335" fill="#fffdf8" font-size="19" font-weight="500"><tspan x="1304" dy="0">Whose memories are absent?</tspan></text>
<text x="1304" y="363" fill="#bac3ca" font-size="12" font-weight="500"><tspan x="1304" dy="0">Official archives can document decisions</tspan></text>
<text x="1304" y="386" fill="#bac3ca" font-size="12" font-weight="500"><tspan x="1304" dy="0">without capturing how those decisions felt</tspan></text>
<text x="1304" y="409" fill="#bac3ca" font-size="12" font-weight="500"><tspan x="1304" dy="0">to displaced or marginalized residents.</tspan></text>
