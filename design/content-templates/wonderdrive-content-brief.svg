<text x="876" y="474" fill="#17212b" font-size="21" font-weight="500"><tspan x="876" dy="0">Rituals</tspan></text>
<text x="876" y="502" fill="#17212b" font-size="13" font-weight="500"><tspan x="876" dy="0">Stories, festivals, and protest routes preserve what institutions may omit.</tspan></text>
