<text x="76" y="474" fill="#17212b" font-size="21" font-weight="500"><tspan x="76" dy="0">Records</tspan></text>
<text x="76" y="502" fill="#17212b" font-size="13" font-weight="500"><tspan x="76" dy="0">Laws, plans, archives, and names preserve the decisions a city made.</tspan></text>
