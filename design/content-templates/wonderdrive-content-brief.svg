<text x="78" y="286" fill="#17212b" font-size="8" font-weight="500"><tspan x="78" dy="0">SHORT ANSWER</tspan></text>
<text x="78" y="319" fill="#17212b" font-size="18" font-weight="500"><tspan x="78" dy="0">A city remembers through official records, physical places, and stories that communities keep alive.</tspan></text>
