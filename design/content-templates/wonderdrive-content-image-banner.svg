<text x="980" y="524" fill="#d64b38" font-size="9" font-weight="500"><tspan x="980" dy="0">WHY IT MATTERS</tspan></text>
<text x="980" y="557" fill="#17212b" font-size="16" font-weight="500"><tspan x="980" dy="0">When these systems disagree, the gap becomes evidence:</tspan></text>
<text x="980" y="585" fill="#17212b" font-size="16" font-weight="500"><tspan x="980" dy="0">it shows which histories were protected and which required</tspan></text>
<text x="980" y="613" fill="#17212b" font-size="16" font-weight="500"><tspan x="980" dy="0">communities to preserve them outside official channels.</tspan></text>
