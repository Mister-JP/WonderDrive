<text x="83" y="469" fill="#17212b" font-size="9" font-weight="500"><tspan x="83" dy="0">Memory map · archival overlays and contested landmarks</tspan></text>
<text x="1755" y="468" fill="#1971c2" font-size="8" font-weight="500"><tspan x="1755" dy="0">SOURCE ↗</tspan></text>
<text x="58" y="524" fill="#667085" font-size="9" font-weight="500"><tspan x="58" dy="0">ANSWER</tspan></text>
<text x="58" y="557" fill="#17212b" font-size="16" font-weight="500"><tspan x="58" dy="0">Cities remember through three overlapping systems: the official record, the built</tspan></text>
<text x="58" y="585" fill="#17212b" font-size="16" font-weight="500"><tspan x="58" dy="0">environment, and the stories residents continue to tell.</tspan></text>
