<text x="409.35" y="260" fill="#63707c" font-size="15" font-weight="500"><tspan x="409.35" dy="0">PUBLIC WEB EXPERIENCE</tspan><tspan x="409.35" dy="18.75">choose a performer, model, question, and next path</tspan><tspan x="409.35" dy="18.75"></tspan><tspan x="409.35" dy="18.75">TRUSTED SERVER ROUTES</tspan><tspan x="409.35" dy="18.75">resolve identity · enforce ownership and limits</tspan><tspan x="409.35" dy="18.75">assemble research context · validate · persist · stream</tspan><tspan x="409.35" dy="18.75"></tspan><tspan x="409.35" dy="18.75">Sites owns the application boundary and server-only secrets.</tspan></text>
<text x="409.35" y="521" fill="#63707c" font-size="11" font-weight="500"><tspan x="409.35" dy="0">React / Vinext application · Sign in with ChatGPT seam</tspan></text>
<rect x="1378.5" y="145" width="756" height="206.25" rx="8" fill="#eee6ff" stroke="#7451b8" stroke-width="2"/>
<text x="1401.6000000000001" y="192.5" fill="#202933" font-size="25" font-weight="600"><tspan x="1401.6000000000001" dy="0">OpenAI Responses API</tspan></text>
<text x="1401.6000000000001" y="234" fill="#63707c" font-size="14" font-weight="500"><tspan x="1401.6000000000001" dy="0">The audience-selected model researches and performs the turn.</tspan><tspan x="1401.6000000000001" dy="17.5">Built-in web search · structured output · provider-returned sources</tspan><tspan x="1401.6000000000001" dy="17.5">No hidden planner, second model, or background agent.</tspan></text>
<text x="1401.6000000000001" y="327.25" fill="#63707c" font-size="11" font-weight="500"><tspan x="1401.6000000000001" dy="0">server-to-server · store: false</tspan></text>
<rect x="1378.5" y="401.25" width="756" height="206.25" rx="8" fill="#ddf7e8" stroke="#16815d" stroke-width="2"/>
<text x="1401.6000000000001" y="448.75" fill="#202933" font-size="25" font-weight="600"><tspan x="1401.6000000000001" dy="0">Sites-managed D1</tspan></text>
<text x="1401.6000000000001" y="490.25" fill="#63707c" font-size="14" font-weight="500"><tspan x="1401.6000000000001" dy="0">Canonical durable product state: identity, preferences, journeys,</tspan><tspan x="1401.6000000000001" dy="17.5">turns, choices, graph edges, research evidence, usage, and snapshots.</tspan><tspan x="1401.6000000000001" dy="17.5">Only Sites server routes can access the `DB` binding.</tspan></text>
<text x="1401.6000000000001" y="583.5" fill="#63707c" font-size="11" font-weight="500"><tspan x="1401.6000000000001" dy="0">Cloudflare D1 through the Sites-managed DB binding</tspan></text>
